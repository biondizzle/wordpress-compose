services:
  wordpress:
    image: ord.vultrcr.com/deepdish/wordpress-compose:latest
    container_name: wordpress
    restart: always
    ports:
      - "8001:80"
    environment:
      - SERVER_NAME=${WORDPRESS_DOMAIN:-localhost}
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${DB_PASSWORD:-wordpress}
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_URL=${WORDPRESS_URL:-http://localhost}
      - WORDPRESS_TABLE_PREFIX=wp_
      - WP_DEBUG=false
      # WordPress salts — generate at https://api.wordpress.org/secret-key/1.1/salt/
      - AUTH_KEY=${AUTH_KEY}
      - SECURE_AUTH_KEY=${SECURE_AUTH_KEY}
      - LOGGED_IN_KEY=${LOGGED_IN_KEY}
      - NONCE_KEY=${NONCE_KEY}
      - AUTH_SALT=${AUTH_SALT}
      - SECURE_AUTH_SALT=${SECURE_AUTH_SALT}
      - LOGGED_IN_SALT=${LOGGED_IN_SALT}
      - NONCE_SALT=${NONCE_SALT}
      # FTP server creds (internal, must match ftpserver.json)
      - FTP_HOST=127.0.0.1:2121
      - FTP_USER=${FTP_USER:-wordpress}
      - FTP_PASS=${FTP_PASS:-wordpress}
    volumes:
      - ./data/wp-content:/app/wp-content
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordpress

  db:
    image: mariadb:11
    container_name: wordpress-db
    restart: always
    command: >-
      --max-connections=200
      --innodb-buffer-pool-size=1G
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-wordpress_root}
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=${DB_PASSWORD:-wordpress}
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - wordpress
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  wordpress:
    driver: bridge
